name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install Haxelib dependencies
        run: |
          haxelib setup ~/haxelib
          # 安装 Lime（会提供 lime 命令）
          haxelib install lime 8.1.2
          # 将 haxelib 的 bin 目录添加到 PATH
          echo "$HOME/haxelib/bin" >> $GITHUB_PATH
          echo "$HOME/.haxelib/bin" >> $GITHUB_PATH
          # 安装其他依赖
          haxelib install openfl 9.3.3
          haxelib install flixel 5.6.0
          haxelib install flixel-addons 3.2.2
          haxelib install flixel-ui 2.6.0
          haxelib install hscript 2.5.0
          haxelib install polymod 1.8.0
          haxelib install actuate
          haxelib install extension-webview
          haxelib install linc_luajit
          haxelib install hxvm-luajit
          haxelib git discord_rpc https://github.com/Aidan63/linc_discord-rpc

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 确认 lime 命令可用
      - name: Verify lime installation
        run: |
          which lime || echo "lime not found"
          lime --version || echo "lime command failed"

      # 配置 Lime Android 目标
      - name: Setup Lime Android
        run: |
          echo "y" | lime setup android
          # 或者尝试自动配置
          lime config ANDROID_SDK $ANDROID_HOME

      - name: Create videos directory
        run: mkdir -p assets/videos

      - name: Build Android APK
        run: |
          haxelib run lime build android -final

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KairosEngine-APK
          path: export/release/android/bin/app-debug.apk
