name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install Haxelib dependencies
        run: |
          haxelib setup ~/haxelib
          # 安装 Lime
          haxelib install lime 8.1.2
          # 查找 Lime 的实际位置
          find ~ -name "lime" -type f 2>/dev/null || true
          # 尝试添加可能的位置到 PATH
          echo "$HOME/haxelib/bin" >> $GITHUB_PATH
          echo "$HOME/.haxelib/bin" >> $GITHUB_PATH
          echo "$HOME/haxe/lib/lime/git/bin" >> $GITHUB_PATH
          # 安装其他依赖
          haxelib install openfl 9.3.3
          haxelib install flixel 5.6.0
          haxelib install flixel-addons 3.2.2
          haxelib install flixel-ui 2.6.0
          haxelib install hscript 2.5.0
          haxelib install polymod 1.8.0
          haxelib install actuate
          haxelib install extension-webview
          haxelib install linc_luajit
          haxelib install hxvm-luajit
          haxelib git discord_rpc https://github.com/Aidan63/linc_discord-rpc

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 方法1：使用 haxelib run 执行 Lime 命令
      - name: Setup Lime Android (via haxelib run)
        run: |
          echo "y" | haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_HOME

      # 方法2：如果上面失败，尝试手动配置
      - name: Manual Android SDK config
        run: |
          mkdir -p ~/.lime
          echo "android.sdk.path=$ANDROID_HOME" >> ~/.lime/config.xml

      - name: Create videos directory
        run: mkdir -p assets/videos

      - name: Build Android APK
        run: |
          haxelib run lime build android -final

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KairosEngine-APK
          path: export/release/android/bin/app-debug.apk
